[pytest]
# Configuração do pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções padrão
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers customizados
markers =
    unit: testes unitários
    integration: testes de integração
    slow: testes que demoram mais tempo
    rpa: testes do módulo RPA
    etl: testes do módulo ETL
    bigquery: testes do BigQuery

# Cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:






